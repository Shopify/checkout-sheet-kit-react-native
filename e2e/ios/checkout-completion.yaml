appId: com.shopify.example.CheckoutKitReactNative
name: Checkout completion
tags:
  - ios
  - checkout
---
# Timeout tiers:
#   10000  - in-app interactions (taps, animations)
#   30000  - checkout step transitions (network)
#   60000  - cold starts (first launch, first paint of checkout)
- launchApp:
    clearState: true
    arguments:
      AppleLocale: en_US
      AppleLanguages: "(en)"
- extendedWaitUntil:
    visible:
      id: product-0-add-to-cart-button
    timeout: 60000
- tapOn:
    id: product-0-add-to-cart-button
    enabled: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    id: cart-tab
- extendedWaitUntil:
    visible:
      id: checkout-button
    timeout: 30000
- tapOn:
    id: checkout-button
    enabled: true
- extendedWaitUntil:
    visible:
      text: "^Email( or mobile phone number)?$"
    timeout: 60000
- tapOn:
    text: "^Email( or mobile phone number)?$"
- inputText: "maestro.e2e@shopify.com"
- hideKeyboard
- tapOn:
    text: "^First name \\(optional\\)$"
- inputText: "Maestro"
- hideKeyboard
- tapOn:
    text: "^Last name$"
- inputText: "Shopify"
- tapOn: "go down"
- retry:
    maxRetries: 3
    commands:
      - eraseText: 40
      - scrollUntilVisible:
          element:
            text: "^ZIP code$"
          direction: DOWN
          timeout: 10000
          centerElement: true
      - inputText: "350 5th Ave New York"
      - extendedWaitUntil:
          visible: ".*United States.*"
          timeout: 30000
      - tapOn:
          text: ".*United States.*"
          index: 1
      - extendedWaitUntil:
          visible: "^Economy$"
          timeout: 30000
- tapOn: "selected"
- scrollUntilVisible:
    element:
      text: "^Field container for: Card number$"
    direction: DOWN
    timeout: 30000
    centerElement: true
- tapOn:
    text: "^Field container for: Card number$"
- inputText: "4242424242424242"
- scrollUntilVisible:
    element:
      text: "^Field container for: Expiration date \\(MM / YY\\)$"
    direction: DOWN
    timeout: 30000
    centerElement: true
- tapOn:
    text: "^Field container for: Expiration date \\(MM / YY\\)$"
- inputText: "1230"
- scrollUntilVisible:
    element:
      text: "^Field container for: Security code$"
    direction: DOWN
    timeout: 30000
    centerElement: true
- tapOn:
    text: "^Field container for: Security code$"
- inputText: "123"
- scrollUntilVisible:
    element:
      text: "^Field container for: Name on card$"
    direction: DOWN
    timeout: 30000
    centerElement: true
- tapOn:
    text: "^Field container for: Name on card$"
- inputText: "Maestro Shopify"
- scrollUntilVisible:
    element:
      text: "^Pay now$"
    direction: DOWN
    timeout: 30000
- tapOn:
    text: "^Pay now$"
    enabled: true
- extendedWaitUntil:
    visible: "Thank you"
    timeout: 60000
- tapOn: "Close"
- extendedWaitUntil:
    visible: "Your cart is empty."
    timeout: 30000
